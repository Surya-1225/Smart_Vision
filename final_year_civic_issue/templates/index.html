<!DOCTYPE html>
<html>
<head>
    <title>Smart Civic Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center p-10">
    <h1 class="text-3xl font-bold text-blue-400 mb-6">Crowdsourced Waterlogging Detector</h1>
    
    <div class="bg-slate-800 p-6 rounded-lg shadow-xl w-full max-w-2xl border border-slate-700">
        <div class="flex gap-2 mb-6">
            <input id="loc" type="text" placeholder="Enter Street Name..." class="flex-1 p-2 rounded bg-slate-700 border-none outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="activate()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-bold transition">Start</button>
        </div>

        <div class="rounded-lg overflow-hidden border-2 border-slate-600">
            <img src="/video_feed" class="w-full">
        </div>
        <p id="status" class="mt-4 text-center text-slate-400 italic">System Idle. Enter location to begin.</p>
    </div>

    <script>
        function activate() {
            const val = document.getElementById('loc').value;
            if(!val) return alert("Please enter a location!");
            
            fetch('/start_system', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({location: val})
            }).then(() => {
                document.getElementById('status').innerText = "System Active. Monitoring " + val;
                document.getElementById('status').classList.add('text-green-400');
            });
        }
    </script>
</body>
</html>
